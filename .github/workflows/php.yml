name: PHP CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Show PHP Version
        run: php -v

      - name: Validate PHP Files
        run: |
          find . -name "*.php" -print0 | while IFS= read -r -d '' file
          do
            echo "Checking $file"
            php -l "$file"
          done

      - name: CI Completed Successfully
        run: echo "✅ T & T Fashion Store passed all PHP syntax checks!"